<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/etl-images/etl-logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETL | Site Stock Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/etl-site-stock-page.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/etl-config.js"></script>
<script src="/etl-auth.js"></script>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">
  <img src="/etl-images/etl-logo.png" alt="ETL" class="login-sq" style="width:64px;height:64px;object-fit:contain;display:block;">
      <div class="login-title">Site Stock Portal</div>
      <div class="login-sub">Engineering Trade Links Co. Ltd</div>
    </div>
    <div class="field">
      <label>Select Your Site *</label>
      <select id="login-site">
        <option value="">Loading sites...</option>
      </select>
    </div>
    <div class="field">
      <label>Your Name *</label>
      <input type="text" id="login-name" placeholder="e.g. Eng. Patrick Nyathingu">
    </div>
    <button class="btn-primary" onclick="doLogin()">Continue →</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="app">
  <nav class="app-nav">
    <div class="app-nav-brand">
<a href="/" aria-label="Go to ETL main site" style="display:inline-flex;align-items:center;text-decoration:none;"><img src="/etl-images/etl-logo.png" alt="ETL" class="app-nav-sq" style="width:74px;height:74px;object-fit:contain;display:block;"></a>
      <div>
        <div class="app-nav-title" id="nav-site-name">Site Portal</div>
        <div class="app-nav-site" id="nav-engineer-name">Engineer</div>
      </div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Sign Out</button>
  </nav>

  <div class="app-body">

    <div id="low-stock-warning" class="alert alert-warning" style="display:none;">
      ⚠️ <span id="low-stock-text"></span>
    </div>

    <!-- STATS -->
    <div class="site-stats">
      <div class="site-stat">
        <div class="site-stat-num" id="stat-items">—</div>
        <div class="site-stat-label">Items on Site</div>
      </div>
      <div class="site-stat danger">
        <div class="site-stat-num" id="stat-today">—</div>
        <div class="site-stat-label">Used Today</div>
      </div>
      <div class="site-stat green">
        <div class="site-stat-num" id="stat-returns">—</div>
        <div class="site-stat-label">Returns Today</div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('stock', this)">📦 My Stock</button>
      <button class="tab-btn" onclick="switchTab('log', this)">📝 Log Usage</button>
      <button class="tab-btn" onclick="switchTab('history', this)">🕐 History</button>
    </div>

    <!-- MY STOCK TAB -->
    <div id="tab-stock">
      <div class="card">
        <div class="card-header">
          <h3>Stock on This Site</h3>
          <button style="background:var(--light-bg);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;color:var(--primary);cursor:pointer;" onclick="loadSiteStock()">↻ Refresh</button>
        </div>
        <div id="stock-list"><div class="loading">Loading stock...</div></div>
      </div>
    </div>

    <!-- LOG USAGE TAB -->
    <div id="tab-log" style="display:none;">
      <div class="card">
        <div class="card-header"><h3>📤 Record Usage / Return</h3></div>
        <div class="quick-form">
          <div class="field">
            <label>Item *</label>
            <select id="log-item"></select>
          </div>
          <div class="field">
            <label>Quantity *</label>
            <input type="number" id="log-qty" min="0.1" step="0.1" placeholder="e.g. 5">
          </div>
          <div class="field">
            <label>Notes (optional)</label>
            <input type="text" id="log-notes" placeholder="e.g. Used for foundation slab">
          </div>
          <div class="btn-row">
            <button class="btn-use" onclick="submitLog('consumed')">📤 Record Usage</button>
            <button class="btn-return" onclick="submitLog('returned')">📥 Return to Store</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h3>📋 Request More Stock</h3></div>
        <div class="quick-form">
          <div class="field">
            <label>Item Needed *</label>
            <select id="req-item"></select>
          </div>
          <div class="field">
            <label>Quantity Needed *</label>
            <input type="number" id="req-qty" min="0.1" step="0.1" placeholder="e.g. 20">
          </div>
          <div class="field">
            <label>Reason / Notes</label>
            <input type="text" id="req-notes" placeholder="e.g. Starting column works tomorrow">
          </div>
          <button class="btn-request" onclick="submitRequest()">📨 Send Request to Store</button>
        </div>
      </div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" style="display:none;">
      <div class="card">
        <div class="card-header">
          <h3>My Activity Log</h3>
          <button style="background:var(--light-bg);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;color:var(--primary);cursor:pointer;" onclick="loadHistory()">↻ Refresh</button>
        </div>
        <div id="history-list"><div class="loading">Loading history...</div></div>
      </div>
    </div>

  </div>
</div>

<script src="/etl-site-stock-page.js"></script>
</body>
</html>
