<html lang="en">
<head>

<title>ETL | Operations Dashboard</title>

<style>
  :root {
    --primary: #1a3c6e; --secondary: #4fa3d1; --light-bg: #eaf2fb;
    --lighter-bg: #f5f9fd; --white: #ffffff; --text: #1e293b;
    --text-muted: #64748b; --border: #cfe3f0;
    --gold: #c8860a; --gold-bg: #fdf3e0;
    --success: #0f7a4a; --success-bg: #e6f7ef;
    --danger: #c0392b; --danger-bg: #fdf0ef;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--lighter-bg); color: var(--text); min-height: 100vh; }

  .top-nav {
    background: var(--primary); height: 64px; display: flex; align-items: center;
    justify-content: space-between; padding: 0 5%;
  }
  .top-nav-brand { display: flex; align-items: center; gap: 12px; }
  .top-nav-sq { background: transparent; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .top-nav-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; color: var(--white); text-transform: uppercase; }
  .top-nav-sub { font-size: 9px; color: rgba(255,255,255,0.6); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; display: block; }
  .nav-actions { display: flex; gap: 10px; }
  .nav-btn { text-decoration: none; color: var(--white); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; padding: 8px 16px; border: 1.5px solid rgba(255,255,255,0.3); border-radius: 6px; transition: all 0.2s; background: transparent; cursor: pointer; }
  .nav-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.6); }
  .nav-btn.gold { background: var(--gold); border-color: var(--gold); }

  .dash-wrap { max-width: 1500px; margin: 0 auto; padding: 36px 3% 60px; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  @media(max-width:700px){ .stats-row { grid-template-columns: repeat(2,1fr); } }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
  .stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 900; color: var(--primary); }
  .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-top: 2px; }
  .stat-card.gold .stat-num { color: var(--gold); }
  .stat-card.green .stat-num { color: var(--success); }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 4px; width: fit-content; }
  .tab-btn { padding: 8px 20px; border-radius: 8px; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
  .tab-btn.active { background: var(--primary); color: var(--white); }

  /* TABLE */
  .table-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: auto; }
  .table-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .table-header h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; color: var(--primary); text-transform: uppercase; }
  .table-header .refresh-btn { background: var(--light-bg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 14px; font-size: 12px; font-weight: 700; color: var(--primary); cursor: pointer; transition: all 0.2s; }
  .table-header .refresh-btn:hover { background: var(--secondary); color: var(--white); border-color: var(--secondary); }

  table { width: 100%; border-collapse: collapse; }
  th { background: var(--lighter-bg); padding: 11px 16px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  td { padding: 13px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--lighter-bg); }

  /* LPO Table Column Widths */
  tbody tr:first-child td:nth-child(1), thead tr th:nth-child(1) { width: 12%; }
  tbody tr:first-child td:nth-child(2), thead tr th:nth-child(2) { width: 15%; }
  tbody tr:first-child td:nth-child(3), thead tr th:nth-child(3) { width: 10%; }
  tbody tr:first-child td:nth-child(4), thead tr th:nth-child(4) { width: 15%; }
  tbody tr:first-child td:nth-child(5), thead tr th:nth-child(5) { width: 10%; }
  tbody tr:first-child td:nth-child(6), thead tr th:nth-child(6) { width: 10%; }
  tbody tr:first-child td:nth-child(7), thead tr th:nth-child(7) { width: 10%; }
  tbody tr:first-child td:nth-child(8), thead tr th:nth-child(8) { width: auto; min-width: 160px; }

  /* LPO Table Only - responsive width */
  #lpos-body table { width: 100%; }


  .badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-pending     { background: var(--gold-bg); color: var(--gold); }
  .badge-active      { background: var(--success-bg); color: var(--success); }
  .badge-sent        { background: var(--light-bg); color: var(--secondary); }
  .badge-in_progress { background: #e8f0fe; color: #1a56db; }
  .badge-responded   { background: var(--success-bg); color: var(--success); }
  .badge-closed      { background: #f3f4f6; color: #6b7280; }
  .badge-issued      { background: var(--light-bg); color: var(--primary); }
  .badge-lpo-active    { background: var(--light-bg); color: var(--secondary); }
  .badge-lpo-issued    { background: var(--light-bg); color: var(--primary); }
  .badge-lpo-delivered { background: #e0f7ef; color: #006644; }
  .badge-lpo-paid      { background: var(--success-bg); color: var(--success); }
  .badge-lpo-disputed  { background: #fdf0ef; color: #c0392b; }
  .badge-lpo-closed    { background: #f3f4f6; color: #6b7280; }
  .badge-delivered   { background: #e0f7ef; color: #006644; }
  .badge-paid        { background: var(--success-bg); color: var(--success); }
  .badge-disputed    { background: #fdf0ef; color: #c0392b; }
  .badge-outward { background: var(--light-bg); color: var(--primary); }
  .badge-inward  { background: var(--gold-bg); color: var(--gold); }

  .action-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--lighter-bg); font-size: 11px; font-weight: 700; color: var(--primary); cursor: pointer; transition: all 0.2s; margin-right: 4px; margin-bottom: 2px; display: inline-flex; align-items: center; white-space: nowrap; flex-shrink: 0; }
  .action-btn:hover { background: var(--primary); color: var(--white); border-color: var(--primary); }
  .action-btn.gold:hover { background: var(--gold); border-color: var(--gold); }
  .action-btn:disabled, .action-btn.disabled { opacity: 0.4; cursor: not-allowed; }

  /* Actions column styling */
  #lpos-body table td:last-child { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; }

  table { width: 100%; border-collapse: collapse; }


  .action-btn:hover { background: var(--primary); color: var(--white); border-color: var(--primary); }
  .action-btn.gold:hover { background: var(--gold); border-color: var(--gold); }
  .action-btn:disabled, .action-btn.disabled { opacity: 0.4; cursor: not-allowed; }
  .action-btn:disabled:hover, .action-btn.disabled:hover { background: var(--lighter-bg); color: var(--primary); border-color: var(--border); }
  .status-select {
    padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--lighter-bg); font-size: 11px; font-weight: 700;
    color: var(--primary); cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .status-select:focus { outline: none; border-color: var(--secondary); }
  .status-select:disabled { cursor: not-allowed; opacity: 0.5; }
  .status-select:disabled:hover { border-color: var(--gold); }

  .empty-state { padding: 48px 24px; text-align: center; color: var(--text-muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .loading-state { padding: 40px; text-align: center; color: var(--text-muted); font-size: 14px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 14px; max-width: 620px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 32px; }
  .modal h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 20px; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  .modal-field label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); display: block; margin-bottom: 3px; }
  .modal-field p { font-size: 14px; color: var(--text); font-weight: 500; }
  .modal-field.full { grid-column: 1/-1; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
  .modal-btn { padding: 10px 22px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
  .modal-btn.primary { background: var(--primary); color: var(--white); }
  .modal-btn.secondary { background: var(--lighter-bg); color: var(--text); border: 1px solid var(--border); }
  .modal-btn.gold { background: var(--gold); color: var(--white); }

  /* ── Approved / Pending Row Highlight ── */
  tr.row-approved td { background: #e6f7ef !important; border-top: 2px solid #0f7a4a; border-bottom: 2px solid #0f7a4a; }
  tr.row-approved td:first-child { border-left: 5px solid #0f7a4a !important; }
  tr.row-pending td { background: #fdf3e0 !important; border-top: 2px solid #c8860a; border-bottom: 2px solid #c8860a; }
  tr.row-pending td:first-child { border-left: 5px solid #c8860a !important; }

  /* MOBILE RESPONSIVE - TABLETS (768px and below) */
  @media(max-width:768px) {
    .top-nav { padding: 0 3%; }
    .top-nav-title { font-size: 16px; }
    .nav-btn { font-size: 10px; padding: 6px 12px; }
    .dash-wrap { padding: 24px 3% 40px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { padding: 16px 20px; }
    .stat-num { font-size: 28px; }
    .stat-label { font-size: 10px; }
    .tabs { flex-wrap: wrap; }
    .tab-btn { padding: 6px 16px; font-size: 12px; }
    table { font-size: 12px; }
    th { padding: 8px 12px; font-size: 9px; }
    td { padding: 10px 8px; }
    .action-btn { padding: 4px 10px; font-size: 10px; }
    .modal { padding: 24px; max-height: 90vh; }
    .modal h2 { font-size: 18px; }
    .modal-grid { grid-template-columns: 1fr; gap: 12px; }
  }

  /* MOBILE RESPONSIVE - TABLETS (768px) - TABLES */
  @media(max-width:768px) {
    table { font-size: 12px; }
    thead { display: table; width: 100%; }
    tbody { display: table; width: 100%; }
    tr { display: table-row; width: 100%; }
    th, td { padding: 10px 8px; font-size: 12px; }
    th { font-size: 9px; }
    th:before, td:before { display: none !important; }
  }

  /* Prevent text wrapping on buttons and labels */
  .nav-btn, .action-btn, .modal-btn, .btn-primary, .btn-secondary, .badge, .tab-btn {
    white-space: nowrap;
  }

  /* MOBILE RESPONSIVE - PHONES (480px and below) */
  @media(max-width:480px) {
    :root {
      --primary: #1a3c6e; --secondary: #4fa3d1; --light-bg: #eaf2fb;
      --lighter-bg: #f5f9fd; --white: #ffffff; --text: #1e293b;
      --text-muted: #64748b; --border: #cfe3f0;
      --gold: #c8860a; --gold-bg: #fdf3e0;
      --success: #0f7a4a; --success-bg: #e6f7ef;
      --danger: #c0392b; --danger-bg: #fdf0ef;
    }

    body { font-size: 14px; }

    /* NAV */
    .top-nav { height: 56px; padding: 0 2%; }
    .top-nav-brand { gap: 8px; }
    .top-nav-sq { width: 32px; height: 32px; font-size: 14px; }
    .top-nav-title { font-size: 14px; font-weight: 700; }
    .top-nav-sub { font-size: 8px; }
    .nav-actions { flex-wrap: wrap; gap: 6px; }
    .nav-btn { font-size: 9px; padding: 6px 10px; border-radius: 4px; }

    /* MAIN */
    .dash-wrap { padding: 16px 2% 32px; max-width: 100%; }

    /* STATS */
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
    .stat-card { padding: 12px 14px; border-radius: 8px; }
    .stat-num { font-size: 20px; }
    .stat-label { font-size: 9px; }

    /* TABS */
    .tabs { gap: 2px; padding: 3px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn { padding: 6px 12px; font-size: 11px; border-radius: 6px; }

    /* TABLE */
    .table-card { border-radius: 8px; }
    .table-header { padding: 12px 14px; }
    .table-header h3 { font-size: 14px; }
    .table-header .refresh-btn { padding: 6px 12px; font-size: 11px; }

    table { font-size: 11px; width: 100%; display: block; overflow-x: auto; }
    thead { display: block; }
    tbody { display: block; overflow-x: auto; }
    tr { display: flex; width: 100%; }
    th, td { padding: 8px; font-size: 11px; word-break: break-word; min-width: 100px; flex: 1; }
    th { font-size: 8px; font-weight: 700; background: var(--lighter-bg); }

    .badge { padding: 2px 6px; font-size: 8px; }
    .action-btn { padding: 4px 8px; font-size: 9px; margin-right: 2px; margin-bottom: 4px; display: inline-block; }
    .status-select { padding: 4px 8px; font-size: 10px; }

    /* MODAL */
    .modal-overlay { padding: 10px; }
    .modal { padding: 20px; border-radius: 10px; max-height: 95vh; }
    .modal h2 { font-size: 16px; margin-bottom: 16px; }
    .modal-grid { grid-template-columns: 1fr; gap: 10px; }
    .modal-field label { font-size: 9px; margin-bottom: 2px; }
    .modal-field p { font-size: 13px; }
    .modal-actions { flex-direction: column-reverse; gap: 8px; }
    .modal-btn { padding: 10px 16px; font-size: 12px; width: 100%; }

    /* EMPTY STATE */
    .empty-state { padding: 32px 16px; }
    .empty-state .icon { font-size: 32px; }
    .empty-state p { font-size: 12px; }

    /* LOADING STATE */
    .loading-state { padding: 24px; font-size: 12px; }

    /* ROW HIGHLIGHTS */
    tr.row-approved td:first-child,
    tr.row-pending td:first-child { border-left-width: 3px !important; }
  }

</style>
</head>

  async function updateLPOStatus(id, status) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/lpos?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SESSION_TOKEN}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ status })
      });
      if(res.ok) {
        const badge = document.getElementById(`lpo-status-${id}`);
        if(badge) {
          const labels = {
            active:'📋 Active', issued:'📤 Issued', delivered:'✅ Delivered',
            paid:'💰 Paid', disputed:'⚠️ Disputed', closed:'🔒 Closed'
          };
          badge.className = `badge badge-lpo-${status}`;
          badge.innerText = labels[status] || status;
        }
        // Update stats
        loadLPOs();
      } else {
        alert('Could not update LPO status. Please try again.');
      }
    } catch(e) {
      alert('Network error: ' + e.message);
    }
  }

  async function updateStatus(id, status) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/quotation_requests?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SESSION_TOKEN}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ status })
      });
      if(res.ok) {
        // Update badge
        const badge = document.getElementById(`req-badge-${id}`);
        if(badge) {
          const labels = { pending_approval:'⏳ Pending Approval', approved:'✅ Approved', in_progress:'🔄 In Progress', responded:'📤 Responded', rejected:'❌ Rejected', closed:'🔒 Closed' };
          badge.className = `badge badge-${status}`;
          badge.innerText = labels[status] || status;
        }
        // If status changed to approved, notify ETL staff
        if(status === 'approved') {
          const r = window._reqData && window._reqData.find(x => x.id === id);
          const name    = r ? r.client_name    : 'Client';
          const email   = r ? r.client_email   : '';
          const project = r ? r.project_title  : 'Project';
          // Notify ETL staff
          sendEmail('tokui@usiu.ac.ke', `✅ Action Required: Generate Quotation — ${name} | ${project}`, `A quotation request has been approved and is ready for you to generate.\n\nCLIENT DETAILS:\nName: ${name}\nEmail: ${email}\nProject: ${project}\n\nLog in to the ETL Dashboard and click Generate Quotation to proceed.\n\nDashboard: https://engineeringtradelinks.pages.dev/ETL-Dashboard.html`);

        }
        // Reload to reflect new button states
        loadRequests();
      } else {
        alert('Could not update status. Please try again.');
      }
    } catch(e) {
      alert('Network error: ' + e.message);
    }
  }

  function openGeneratorFromModal() {
    openGenerator(null, window._currentRequest);
  }

  function openGenerator(i, directRecord) {
    // If called from a request row, pass the data via URL params
    const r = directRecord || (i !== undefined && i !== null && window._reqData) ? (directRecord || window._reqData[i]) : null;
    if(r) {
      const params = new URLSearchParams({
        client_name:    r.client_name    || '',
        contact_person: r.contact_person || '',
        client_email:   r.client_email   || '',
        client_phone:   r.client_phone   || '',
        client_address: r.client_address || '',
        project_title:  r.project_title  || '',
        project_location: r.project_location || '',
        project_description: r.project_description || '',
        services_category:   r.services_category   || '',
        project_duration:    r.project_duration     || '',
        ref_id: r.id || ''
      });
      window.open('ETL-Quotation-generator.html?' + params.toString(), '_blank');
    } else {
      window.open('ETL-Quotation-generator.html', '_blank');
    }
  }

    document.getElementById('approvals-body').innerHTML = '<div class="loading-state">Loading...</div>';
    try {
      // Fetch pending quotation requests
      const [resQ, resL] = await Promise.all([
        fetch(`${SUPABASE_URL}/rest/v1/quotation_requests?status=in.(pending_approval,pending)&order=created_at.desc`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SESSION_TOKEN}` }
        }),
        fetch(`${SUPABASE_URL}/rest/v1/lpos?status=eq.pending_approval&order=created_at.desc`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SESSION_TOKEN}` }
        })
      ]);
      const data  = await resQ.json();
      const lpos  = await resL.json();

      // Update badge count
      const badge = document.getElementById('approval-count-badge');
      const total = data.length + lpos.length;
      if(total > 0) { badge.style.display = ''; badge.innerText = total; }

          <tr>
            <td><strong>${r.client_name || '—'}</strong></td>
            <td>${r.contact_person || '—'}</td>
            <td>${r.project_title || '—'}</td>
            <td>${r.client_email || '—'}</td>
            <td>${r.estimated_budget || '—'}</td>
            <td>${fmtDate(r.created_at)}</td>

      }

      if(lpos.length) {
        const lpoRows = lpos.map((l,i) => `
          <tr class="row-pending">
            <td data-label="LPO Number"><strong>${decode(l.lpo_number) || '—'}</strong></td>
            <td data-label="Entity">${l.entity_name || '—'}</td>

              <button class="action-btn reject" onclick="rejectLPO('${l.id}')">❌ Reject</button>
            </td>
          </tr>`).join('');
        html += '<div><h3 style="font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:800;color:var(--primary);text-transform:uppercase;padding:0 4px 8px;border-bottom:2px solid var(--border);margin-bottom:12px;">⏳ Pending LPOs (' + lpos.length + ')</h3><table><thead><tr><th>LPO Number</th><th>Entity</th><th>Direction</th><th>Email</th><th>Total</th><th>Date</th><th>Actions</th></tr></thead><tbody>' + lpoRows + '</tbody></table></div>';

  async function rejectLPO(id) {
    const reason = prompt('Enter rejection reason (optional):');
    if(reason === null) return;
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/lpos?id=eq.${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SESSION_TOKEN}`, 'Prefer': 'return=minimal' },
        body: JSON.stringify({ status: 'rejected', notes: reason || 'Rejected by management' })
      });
      alert('LPO has been rejected.');
      loadApprovals();
      loadLPOs();
    } catch(e) { alert('Error: ' + e.message); }
  }

  async function approveLPO(id) {
    if(!confirm('Approve this LPO?')) return;
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/lpos?id=eq.${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SESSION_TOKEN}`, 'Prefer': 'return=minimal' },
        body: JSON.stringify({ status: 'approved' })
      });
      alert('✅ LPO approved successfully!');
      loadApprovals();
      loadLPOs();
    } catch(e) { alert('Error: ' + e.message); }
  }

  function doApprove(i) {
    const r = window._approvalData[i];
    approveRequest(r.id, r.client_email, r.client_name, r.project_title);
  }
  function doReject(i) {
    const r = window._approvalData[i];
    rejectRequest(r.id, r.client_email, r.client_name, r.project_title);
  }
  function doApproveById(id, email, name, project) {
    approveRequest(id, email, name, project);
    closeModal();
  }
  function doRejectById(id, email, name, project) {
    rejectRequest(id, email, name, project);
    closeModal();
  }

  async function approveRequest(id, email, name, project) {
    if(!confirm(`Approve quotation request from ${name} for ${project}?`)) return;
    const approver = currentRole === 'management' ? 'Management' : 'ETL Staff';
    const res = await fetch(`${SUPABASE_URL}/rest/v1/quotation_requests?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SESSION_TOKEN}`, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: 'approved', approved_by: approver, approved_at: new Date().toISOString() })
    });
    if(res.ok) {

      // Email 1 → ETL Staff: Action required + confirmation
      sendEmail('tokui@usiu.ac.ke', `✅ Action Required: Generate Quotation — ${name} | ${project}`, `A quotation request has been approved by ${approver} and is ready for you to generate.

CLIENT DETAILS:
Name: ${name}
Email: ${email}
Project: ${project}

Please log in to the ETL Dashboard and click Generate Quotation to proceed.\n\nDashboard: https://engineeringtradelinks.pages.dev/ETL-Dashboard.html`);

      alert('✅ Request approved! ETL staff have been notified to generate the quotation.');
      loadApprovals();
      loadRequests();
    } else { alert('Could not update. Please try again.'); }
  }

  async function rejectRequest(id, email, name, project) {
    const reason = prompt(`Enter reason for rejecting ${name}'s request (this will be sent to the client):`);
    if(!reason) return;
    const res = await fetch(`${SUPABASE_URL}/rest/v1/quotation_requests?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SESSION_TOKEN}`, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: 'rejected', rejection_reason: reason, approved_by: 'Management' })
    });
    if(res.ok) {
      // Notify client via EmailJS
      sendEmail(email, `Re: Your Quotation Request — ${project}`, `Dear ${name},

Thank you for reaching out to Engineering Trade Links Co. Ltd.

After reviewing your quotation request for "${project}", we regret that we are unable to proceed at this time.

Reason: ${reason}

We encourage you to reach out again in the future. We appreciate your interest in our services.

Kind regards,
Engineering Trade Links Co. Ltd
+256 776 566 522
tradelinks.ltd@gmail.com`);
      alert('Request rejected and client has been notified by email.');
      loadApprovals();
      loadRequests();
    } else { alert('Could not update. Please try again.'); }
  }

  // ─── STOCK CHECK ───
  async function checkStock(i) {
    const l = window._lpoData[i];
    if(!l.items || !l.items.length) { alert('No items found in this LPO to check against inventory.'); return; }

    // Load inventory
    const res = await fetch(`${SUPABASE_URL}/rest/v1/inventory_items?select=name,current_stock,unit`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SESSION_TOKEN}` }
    });
    const inventory = await res.json();

    // Check each LPO item against inventory
    let html = '<div class="stock-check-list">';
    let allInStock = true;
    let outOfStock = [];

    l.items.forEach(item => {
      const inv = inventory.find(i => i.name.toLowerCase().includes(item.desc.toLowerCase()) || item.desc.toLowerCase().includes(i.name.toLowerCase()));
      let statusHtml = '';
      if(inv) {
        if(inv.current_stock >= item.qty) {
          statusHtml = `<span style="color:var(--success);font-weight:700;">✅ In Stock (${Math.round(inv.current_stock).toLocaleString()} ${inv.unit})</span>`;
        } else if(inv.current_stock > 0) {
          statusHtml = `<span style="color:var(--warning);font-weight:700;">⚠️ Low (${Math.round(inv.current_stock).toLocaleString()} / ${item.qty} needed)</span>`;
          allInStock = false;
          outOfStock.push(item.desc);
        } else {
          statusHtml = `<span style="color:var(--danger);font-weight:700;">❌ Out of Stock</span>`;
          allInStock = false;
          outOfStock.push(item.desc);
        }
      } else {
        statusHtml = `<span style="color:var(--text-muted);font-weight:700;">⚠️ Not in Inventory</span>`;
        allInStock = false;
        outOfStock.push(item.desc);
      }
      html += `<div class="stock-check-item">
        <span><strong>${item.desc}</strong> — ${item.qty} ${item.unit}</span>
        ${statusHtml}
      </div>`;
    });

    html += '</div>';

    if(allInStock) {
      html += `<div style="padding:16px;border-top:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        <p style="font-size:13px;color:var(--success);font-weight:600;flex:1;">✅ All items are in stock. You can proceed.</p>
        <button class="modal-btn primary" onclick="window.open('ETL-Invoice.html?lpo_id=${l.id}','_blank');closeModal()">🧾 Generate Invoice</button>
      </div>`;
    } else {
      html += `<div style="padding:16px;border-top:1px solid var(--border);">
        <p style="font-size:13px;color:var(--warning);font-weight:600;margin-bottom:12px;">⚠️ Some items are not in stock. Generate a supplier LPO first, then invoice when ready.</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button class="modal-btn primary" onclick="window.open('ETL-LPO-Outward.html','_blank');closeModal()">📦 Generate Supplier LPO</button>
          <button class="modal-btn" style="background:var(--gold);color:#fff;" onclick="window.open('ETL-Invoice.html?lpo_id=${l.id}','_blank');closeModal()">🧾 Generate Invoice Anyway</button>
        </div>
      </div>`;
    }

    document.getElementById('modal-content').innerHTML = `
      <h2>📦 Stock Check — ${l.lpo_number}</h2>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Client: <strong>${l.entity_name}</strong> | Checking ${l.items.length} item(s) against inventory</p>
      ${html}
      <div style="padding:0 16px 16px;">
        <button class="modal-btn secondary" onclick="closeModal()" style="margin-top:8px;">Close</button>
      </div>`;
    document.getElementById('detail-modal').classList.add('open');
  }

  // ─── OVERRIDE switchTab to include approvals ───
  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-requests').style.display  = tab === 'requests'  ? '' : 'none';
    document.getElementById('tab-lpos').style.display      = tab === 'lpos'      ? '' : 'none';
    document.getElementById('tab-approvals').style.display = tab === 'approvals' ? '' : 'none';
    if(tab === 'lpos')      loadLPOs();
    if(tab === 'approvals') loadApprovals();
  }

  // ─── UPDATE showRequest to handle approval context ───
  function showRequest(i, context) {
    const data = context === 'approval' ? window._approvalData : window._reqData;
    const r = data ? data[i] : window._reqData[i];
    if(!r) return;
    window._currentRequest = r; // store for modal buttons
    document.getElementById('modal-content').innerHTML = `
      <h2>📋 Quotation Request</h2>
      <div class="modal-grid">
        <div class="modal-field"><label>Organisation</label><p>${r.client_name || '—'}</p></div>
        <div class="modal-field"><label>Contact Person</label><p>${r.contact_person || '—'}</p></div>
        <div class="modal-field"><label>Email</label><p>${r.client_email || '—'}</p></div>
        <div class="modal-field"><label>Phone</label><p>${r.client_phone || '—'}</p></div>
        <div class="modal-field"><label>Project Title</label><p>${r.project_title || '—'}</p></div>
        <div class="modal-field"><label>Location</label><p>${r.project_location || '—'}</p></div>
        <div class="modal-field"><label>Budget</label><p>${r.estimated_budget || '—'}</p></div>
        <div class="modal-field"><label>Timeline</label><p>${r.timeline || '—'}</p></div>
        <div class="modal-field full"><label>Services Needed</label><p>${r.services_category || '—'}</p></div>
        <div class="modal-field full"><label>Description</label><p>${r.project_description || '—'}</p></div>
        <div class="modal-field"><label>Status</label><p><span class="badge badge-${r.status}">${r.status}</span></p></div>
        <div class="modal-field"><label>Submitted</label><p>${fmtDate(r.created_at)}</p></div>
        ${r.approved_by ? `<div class="modal-field"><label>Reviewed By</label><p>${r.approved_by}</p></div>` : ''}
        ${r.rejection_reason ? `<div class="modal-field full"><label>Rejection Reason</label><p style="color:var(--danger)">${r.rejection_reason}</p></div>` : ''}
      </div>
      <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;">
        ${r.status === 'approved' ? '<button class="modal-btn primary" onclick="openGeneratorFromModal()">📋 Generate Quotation</button>' : ''}
        ${r.status === 'pending_approval' && currentRole === 'management' ? '<button class=\"modal-btn green\" onclick=\"doApproveById(\'' + r.id + '\',\'' + r.client_email + '\',\'' + r.client_name + '\',\'' + r.project_title + '\')\">✅ Approve</button><button class=\"modal-btn danger\" onclick=\"doRejectById(\'' + r.id + '\',\'' + r.client_email + '\',\'' + r.client_name + '\',\'' + r.project_title + '\')\">❌ Reject</button>' : ''}
        <button class="modal-btn secondary" onclick="closeModal()">Close</button>
      </div>`;
    document.getElementById('detail-modal').classList.add('open');
  }

  // ─── Bootstrap: Supabase Auth ───
  etlAuth.init().then(async () => {
    const profile = await etlAuth.getProfile();
    const user    = await etlAuth.getUser();

    // Pull the live session token for REST Authorization headers
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data: { session } } = await sbClient.auth.getSession();
    SESSION_TOKEN = session ? session.access_token : '';

    currentRole = (profile && profile.role) || 'staff';

    // Reveal the UI
    document.getElementById('top-nav').style.display = '';
    document.getElementById('dash-wrap').style.display = '';
    document.getElementById('logout-btn').style.display = '';
    document.querySelector('.top-nav-sub').innerText =
      currentRole === 'management' ? 'Management Access' : 'Staff Access';

    if (currentRole === 'management') {
      document.getElementById('approvals-tab-btn').style.display = '';
    }

    loadRequests();
    loadLPOs();
    if (currentRole === 'management') loadApprovals();
  });
</script>
</body>
</html>
